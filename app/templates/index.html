<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/stars.css">
  <title>Wally</title>
</head>

<body>
  <div id="stars"></div>
  <div id="stars2"></div>
  <div id="stars3"></div>
  <div class="parent">
    <h1> Wally </h1>
    <h2> A deep learning model to simulate Wavelength.</h2>
    {% include 'partials/enter.html' %}
  </div>

  <div class="game">
    <div class="parent">
      {% include 'partials/wheel.html' %}
      <h2 class="score"> . </h2>
      <h2 class="wordPair"> . </h2>
      <h2> Please draw a word pair...</h3>
        <button class="drawbutton"> Draw </button>
        <input type="text">
        <button onclick="predict()">Predict</button>
    </div>
  </div>
  
  <div class="score-display">
    <div class="num" id="score-num">50</div>
    <div class="lbl">score</div>
  </div>
  <div class="controls">
    <div class="ctrl-row">
      <label>Score</label>
      <input type="range" min="0" max="100" value="50" step="1" id="score-slider">
      <span class="val" id="score-val">50</span>
    </div>
    <div class="ctrl-row">
      <label>Spin speed</label>
      <input type="range" min="0" max="5" value="1" step="0.5" id="speed-slider">
      <span class="val" id="speed-val">1x</span>
    </div>
    <div class="btn-row">
      <button id="btn-rand">Random score</button>
      <button id="btn-stop">Pause spin</button>
    </div>
  </div>

 <script src="../static/js/start.js"></script>
 <script src="../static/js/draw.js"></script>
 <script src="../static/js/predict.js"></script>
 <script src="../static/js/wheel.js"></script>
</body>

</html>
